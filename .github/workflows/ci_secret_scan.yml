name: CI Secret Scan

on:
  pull_request:
    branches: [develop]
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for Discord tokens
        run: |
          # Discord Bot Token形式: [MTEx...].[xxxx].[xxxxxxxxxxxxxxxxxxxxxx]
          # 例: "DISCORD_TOKEN" などの環境変数名や、トークン形式の文字列を検出
          if grep -rE '(DISCORD_TOKEN|[MN][A-Za-z\d]{23}\.[\w-]{6,}\.[\w-]{27,})' .; then
            echo "Error: Discordトークンらしき文字列が検出されました。コミットを修正してください。"
            exit 1
          else
            echo "OK: Discordトークンの漏洩は検出されませんでした。"
          fi
